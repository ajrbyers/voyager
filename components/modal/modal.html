<div class="modal-backdrop is-open" role="dialog" aria-modal="true" aria-labelledby="modal-title-1">
  <div class="modal">
    <div class="modal-head">
      <h2 class="modal-title" id="modal-title-1">Withdraw reviewer assignment</h2>
      <button class="modal-close" type="button" aria-label="Close dialog">×</button>
    </div>
    <div class="modal-body">
      <p>Withdrawing this reviewer will close their assignment and notify them by email. The author will not be informed.</p>
      <p>You can replace the reviewer afterwards from the reviewer list.</p>
    </div>
    <div class="modal-foot">
      <button class="btn">Cancel</button>
      <button class="btn btn-warning">Withdraw reviewer</button>
    </div>
  </div>
</div>
