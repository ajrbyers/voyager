<form class="function-filter" role="search" aria-label="Filter manager functions">
  <div class="function-filter-search">
    <span class="function-filter-search-icon" aria-hidden="true">⌕</span>
    <label class="visually-hidden" for="fn-search">Search functions</label>
    <input type="search" name="q" id="fn-search"
           class="function-filter-input"
           placeholder="Search functions…" autocomplete="off">
  </div>

  <div class="function-filter-tags" role="radiogroup" aria-label="Filter by category">
    <label class="function-filter-tag">
      <input type="radio" name="tag" value="all" checked> All
    </label>
    <label class="function-filter-tag">
      <input type="radio" name="tag" value="settings"> Settings
    </label>
    <label class="function-filter-tag">
      <input type="radio" name="tag" value="workflow"> Workflow
    </label>
    <label class="function-filter-tag">
      <input type="radio" name="tag" value="content"> Content
    </label>
    <label class="function-filter-tag">
      <input type="radio" name="tag" value="people"> People
    </label>
    <label class="function-filter-tag">
      <input type="radio" name="tag" value="system"> System
    </label>
  </div>
</form>
